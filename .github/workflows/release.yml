# GitHub Actions workflow for automatic build and release
# Triggers on push to main branch
# Builds the project, creates a zip package, and publishes to GitHub Releases

name: Build and Release

on:
  workflow_run:
    workflows: ["Build Tauri"]
    types:
      - completed
    branches:
      - main

# Prevent concurrent builds
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build the project (generates static export in 'out' directory)
      - name: Build project
        run: npm run build

      # Generate version tag based on date and short commit hash
      - name: Generate version info
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      # Create release package from static export
      - name: Create release package
        run: |
          # The 'out' directory contains the static export
          cd out
          zip -r ../easypdfnex-${{ steps.version.outputs.version }}.zip .
          cd ..
          
          echo "📦 Release package created: easypdfnex-${{ steps.version.outputs.version }}.zip"
          echo "📊 Package size: $(du -h easypdfnex-${{ steps.version.outputs.version }}.zip | cut -f1)"

      # Download Tauri desktop builds from the completed Tauri workflow
      - name: Download Tauri macOS build
        uses: actions/download-artifact@v4
        with:
          name: tauri-macos-latest
          path: tauri-bundles/macos
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download Tauri Windows build
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-latest
          path: tauri-bundles/windows
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download Tauri Linux build
        uses: actions/download-artifact@v4
        with:
          name: tauri-ubuntu-latest
          path: tauri-bundles/linux
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Create GitHub Release with auto-generated notes from commits
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: EasyPDFNex ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 EasyPDFNex Release ${{ steps.version.outputs.version }}

            ### 📦 Download & Install
            Download the appropriate file for your platform:
            - **Windows:** `.msi` or `.exe`
            - **macOS:** `.dmg`
            - **Linux:** `.deb` or `.AppImage`

            Install and run like any desktop application.

            ---
            **Commit:** `${{ github.sha }}`
            **Build Time:** ${{ steps.version.outputs.build_time }}
          files: |
            easypdfnex-${{ steps.version.outputs.version }}.zip
            tauri-bundles/**/*.dmg
            tauri-bundles/**/*.msi
            tauri-bundles/**/*.exe
            tauri-bundles/**/*.deb
            tauri-bundles/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}